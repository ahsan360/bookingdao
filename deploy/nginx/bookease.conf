# ─── Main domain: bookease.com ────────────────────────────────
server {
    listen 80;
    server_name bookease.com www.bookease.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bookease.com www.bookease.com;

    ssl_certificate     /etc/letsencrypt/live/bookease.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookease.com/privkey.pem;

    # Frontend (Landing page)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── API: api.bookease.com ───────────────────────────────────
server {
    listen 80;
    server_name api.bookease.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.bookease.com;

    ssl_certificate     /etc/letsencrypt/live/bookease.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookease.com/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Wildcard: *.bookease.com (tenant subdomains) ────────────
server {
    listen 80;
    server_name *.bookease.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name *.bookease.com;

    # Wildcard SSL certificate (covers all subdomains)
    ssl_certificate     /etc/letsencrypt/live/bookease.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookease.com/privkey.pem;

    client_max_body_size 10M;

    # Frontend (renders TenantBooking based on subdomain)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # API calls from tenant pages
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
